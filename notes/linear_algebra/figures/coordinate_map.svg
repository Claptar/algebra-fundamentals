<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrLong" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <style>
    .blob-V { fill: #e8f0f8; stroke: #1f4e79; stroke-width: 2; }
    .blob-K { fill: #fdf2e9; stroke: #b9770e; stroke-width: 2; }
    .map-arrow { stroke: #333; stroke-width: 1.8; fill: none; }
    .label-big { font-size: 28px; font-style: italic; }
    .label { font-size: 16px; font-style: italic; }
    .map-label { font-size: 16px; fill: #333; font-style: italic; }
    .caption { font-size: 13px; fill: #555; }
    .title { font-size: 16px; fill: #333; }
    .vec-dot { fill: #1f4e79; }
    .col-text { font-size: 15px; font-family: 'Courier New', monospace; }
  </style>

  <text x="350" y="30" text-anchor="middle" class="title">A basis turns abstract vectors into concrete columns</text>

  <!-- V blob (left) -->
  <ellipse cx="150" cy="180" rx="120" ry="90" class="blob-V"/>
  <text x="150" y="100" text-anchor="middle" class="label-big" fill="#1f4e79">V</text>
  <text x="150" y="290" text-anchor="middle" class="caption">abstract vector space</text>

  <!-- a vector x in V -->
  <circle cx="120" cy="180" r="5" class="vec-dot"/>
  <text x="108" y="178" class="label" fill="#1f4e79">x</text>

  <!-- another vector y -->
  <circle cx="180" cy="220" r="5" class="vec-dot"/>
  <text x="190" y="225" class="label" fill="#1f4e79">y</text>

  <!-- K^n blob (right) -->
  <ellipse cx="550" cy="180" rx="120" ry="90" class="blob-K"/>
  <text x="550" y="100" text-anchor="middle" class="label-big" fill="#b9770e">Kⁿ</text>
  <text x="550" y="290" text-anchor="middle" class="caption">columns of scalars</text>

  <!-- column for x -->
  <text x="510" y="178" class="col-text" fill="#b9770e">[x]ₑ</text>
  <circle cx="498" cy="174" r="3" fill="#b9770e"/>

  <!-- column for y -->
  <text x="572" y="225" class="col-text" fill="#b9770e">[y]ₑ</text>
  <circle cx="592" cy="220" r="3" fill="#b9770e"/>

  <!-- arrows between -->
  <path d="M 130 170 Q 340 130 488 170" class="map-arrow" marker-end="url(#arrLong)"/>
  <path d="M 190 230 Q 380 260 580 225" class="map-arrow" marker-end="url(#arrLong)"/>

  <!-- map label -->
  <text x="350" y="135" text-anchor="middle" class="map-label">[ · ]ₑ : V → Kⁿ</text>
  <text x="350" y="155" text-anchor="middle" class="caption">depends on the choice of basis e = (e₁, …, eₙ)</text>

  <!-- bottom note -->
  <text x="350" y="315" text-anchor="middle" font-size="13" fill="#666" font-style="italic">
    The map preserves linear structure: [x + y]ₑ = [x]ₑ + [y]ₑ and [λx]ₑ = λ[x]ₑ
  </text>
</svg>
