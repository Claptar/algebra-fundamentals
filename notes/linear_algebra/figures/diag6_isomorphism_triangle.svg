<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 390" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrUp1_6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/>
    </marker>
    <marker id="arrUp2_6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b9770e"/>
    </marker>
    <marker id="arrC6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 14px; fill: #333; font-weight: bold; }
    .blob-V { fill: #f3f3f3; stroke: #555; stroke-width: 2; }
    .blob-K1 { fill: #e8f0f8; stroke: #1f4e79; stroke-width: 2; }
    .blob-K2 { fill: #fdf2e9; stroke: #b9770e; stroke-width: 2; }
    .arrow-1 { stroke: #1f4e79; stroke-width: 2.5; fill: none; }
    .arrow-2 { stroke: #b9770e; stroke-width: 2.5; fill: none; }
    .arrow-C { stroke: #c0392b; stroke-width: 2.5; fill: none; }
    .label-big { font-size: 28px; font-style: italic; }
    .label-med { font-size: 22px; font-style: italic; }
    .map-label { font-size: 15px; font-style: italic; }
    .caption-inside { font-size: 12px; font-style: italic; }
    .small-caption { font-size: 12px; fill: #555; }
    .note { font-size: 12px; fill: #666; font-style: italic; }
  </style>

  <!-- TITLE -->
  <text x="380" y="30" text-anchor="middle" class="title">
    Two bases, two isomorphisms Kⁿ → V, linked by C
  </text>

  <!-- ===========================
       V at the top
       Ellipse: cx=380, cy=110, rx=100, ry=45
       So V occupies y = 65..155
       =========================== -->
  <ellipse cx="380" cy="110" rx="100" ry="45" class="blob-V"/>
  <text x="380" y="120" text-anchor="middle" class="label-big" fill="#333">V</text>

  <!-- ===========================
       Two Kⁿ blobs at the bottom
       Left: cx=140, cy=275
       Right: cx=620, cy=275
       Both ellipses: rx=100, ry=50
       =========================== -->

  <!-- Left Kⁿ -->
  <ellipse cx="140" cy="275" rx="100" ry="50" class="blob-K1"/>
  <text x="140" y="278" text-anchor="middle" class="label-med" fill="#1f4e79">Kⁿ</text>
  <text x="140" y="298" text-anchor="middle" class="caption-inside" fill="#1f4e79">coords in e</text>

  <!-- Right Kⁿ -->
  <ellipse cx="620" cy="275" rx="100" ry="50" class="blob-K2"/>
  <text x="620" y="278" text-anchor="middle" class="label-med" fill="#b9770e">Kⁿ</text>
  <text x="620" y="298" text-anchor="middle" class="caption-inside" fill="#b9770e">coords in e′</text>

  <!-- ===========================
       Arrows from each Kⁿ up to V
       Left Kⁿ top edge near (215, 240); V bottom near (310, 145)
       Right Kⁿ top edge near (545, 240); V bottom near (450, 145)
       =========================== -->
  <line x1="215" y1="240" x2="310" y2="148" class="arrow-1" marker-end="url(#arrUp1_6)"/>
  <text x="225" y="200" class="map-label" fill="#1f4e79">φₑ</text>
  <text x="248" y="218" class="small-caption" fill="#1f4e79">X ↦ eX</text>

  <line x1="545" y1="240" x2="450" y2="148" class="arrow-2" marker-end="url(#arrUp2_6)"/>
  <text x="525" y="200" text-anchor="end" class="map-label" fill="#b9770e">φₑ′</text>
  <text x="510" y="218" text-anchor="end" class="small-caption" fill="#b9770e">X′ ↦ e′X′</text>

  <!-- ===========================
       Horizontal arrow at the bottom
       Goes from right Kⁿ (X' side) to left Kⁿ (X side)
       Because C: X' -> X (i.e., C sends new coords to old coords)
       Arrow from x=520 to x=240 at y=275
       =========================== -->
  <line x1="520" y1="275" x2="245" y2="275" class="arrow-C" marker-end="url(#arrC6)"/>
  <text x="382" y="266" text-anchor="middle" class="map-label" fill="#c0392b">C</text>
  <text x="382" y="293" text-anchor="middle" class="caption-inside" fill="#c0392b">X′ ↦ CX′ = X</text>

  <!-- Bottom notes -->
  <text x="380" y="350" text-anchor="middle" class="note">
    Triangle commutes: φₑ′ = φₑ ∘ C. Both maps land on the same vector in V — they just start from different copies of Kⁿ.
  </text>
  <text x="380" y="370" text-anchor="middle" class="note">
    Choosing a basis = choosing an isomorphism Kⁿ → V. Changing basis = composing it with an automorphism of Kⁿ (namely C).
  </text>
</svg>
