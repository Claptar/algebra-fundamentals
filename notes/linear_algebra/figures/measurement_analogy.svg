<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrTick" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrB1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/>
    </marker>
    <marker id="arrB2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrVec" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <pattern id="wood" patternUnits="userSpaceOnUse" width="40" height="14">
      <rect width="40" height="14" fill="#c9a26a"/>
      <path d="M 0 7 Q 10 4 20 7 T 40 7" stroke="#a07a48" stroke-width="0.7" fill="none"/>
      <path d="M 0 3 Q 12 1 24 3 T 40 3" stroke="#b08c5a" stroke-width="0.5" fill="none"/>
      <path d="M 0 11 Q 14 9 28 11 T 40 11" stroke="#a07a48" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>

  <style>
    .title { font-size: 15px; fill: #333; font-weight: bold; }
    .panel-title { font-size: 14px; fill: #333; font-weight: bold; }
    .tick { stroke: #555; stroke-width: 1.2; }
    .tick-label { font-size: 11px; fill: #555; }
    .unit-label { font-size: 13px; fill: #555; font-style: italic; }
    .result { font-size: 16px; fill: #333; font-style: italic; }
    .grid { stroke: #eaeaea; stroke-width: 1; }
    .axis { stroke: #999; stroke-width: 1; }
    .basis-blue { stroke: #1f4e79; stroke-width: 2.5; fill: none; }
    .basis-green { stroke: #2e7d32; stroke-width: 2.5; fill: none; }
    .vec { stroke: #c0392b; stroke-width: 2.8; fill: none; }
    .ghost { stroke: #888; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .row-label { font-size: 14px; fill: #444; font-weight: bold; }
    .coord-label { font-size: 13px; font-style: italic; }
  </style>

  <text x="410" y="25" text-anchor="middle" class="title">
    Same object, different numbers — the choice of unit is part of the measurement
  </text>

  <!-- ROW 1: PHYSICAL MEASUREMENT -->
  <text x="20" y="65" class="row-label">Physical length</text>

  <!-- Stick in metric panel -->
  <g transform="translate(60,80)">
    <text x="155" y="15" text-anchor="middle" class="panel-title">Metric system</text>

    <!-- Ruler with metre ticks (each tick = 30 px for visual; stick spans ~1.83 of them) -->
    <line x1="0" y1="60" x2="320" y2="60" stroke="#555" stroke-width="1"/>
    <g class="tick">
      <line x1="0" y1="55" x2="0" y2="65"/>
      <line x1="80" y1="55" x2="80" y2="65"/>
      <line x1="160" y1="55" x2="160" y2="65"/>
      <line x1="240" y1="55" x2="240" y2="65"/>
      <line x1="320" y1="55" x2="320" y2="65"/>
    </g>
    <text x="0" y="80" text-anchor="middle" class="tick-label">0</text>
    <text x="80" y="80" text-anchor="middle" class="tick-label">1 m</text>
    <text x="160" y="80" text-anchor="middle" class="tick-label">2 m</text>
    <text x="240" y="80" text-anchor="middle" class="tick-label">3 m</text>
    <text x="320" y="80" text-anchor="middle" class="tick-label">4 m</text>

    <!-- Stick: 1.83 m = 1.83 * 80 = 146 px wide -->
    <rect x="20" y="35" width="146" height="14" fill="url(#wood)" stroke="#7a5a30" stroke-width="0.8"/>

    <!-- Measurement bracket -->
    <line x1="20" y1="25" x2="166" y2="25" stroke="#1f4e79" stroke-width="1.2"/>
    <line x1="20" y1="22" x2="20" y2="28" stroke="#1f4e79" stroke-width="1.2"/>
    <line x1="166" y1="22" x2="166" y2="28" stroke="#1f4e79" stroke-width="1.2"/>
    <text x="93" y="17" text-anchor="middle" class="result" fill="#1f4e79">1.83 m</text>
  </g>

  <!-- Stick in imperial panel -->
  <g transform="translate(440,80)">
    <text x="155" y="15" text-anchor="middle" class="panel-title">Imperial system</text>

    <!-- Ruler with foot ticks: 1 foot = 0.3048 m, so 1 foot ≈ 0.3048 * 80 ≈ 24.4 px
         Stick is 1.83 m = 6 feet = 6 * 24.4 = 146.4 px. Same stick, same px! -->
    <line x1="0" y1="60" x2="320" y2="60" stroke="#555" stroke-width="1"/>
    <g class="tick">
      <line x1="0" y1="55" x2="0" y2="65"/>
      <line x1="24.4" y1="55" x2="24.4" y2="65"/>
      <line x1="48.8" y1="55" x2="48.8" y2="65"/>
      <line x1="73.2" y1="55" x2="73.2" y2="65"/>
      <line x1="97.6" y1="55" x2="97.6" y2="65"/>
      <line x1="122" y1="55" x2="122" y2="65"/>
      <line x1="146.4" y1="55" x2="146.4" y2="65"/>
      <line x1="170.8" y1="55" x2="170.8" y2="65"/>
      <line x1="195.2" y1="55" x2="195.2" y2="65"/>
      <line x1="219.6" y1="55" x2="219.6" y2="65"/>
      <line x1="244" y1="55" x2="244" y2="65"/>
      <line x1="268.4" y1="55" x2="268.4" y2="65"/>
      <line x1="292.8" y1="55" x2="292.8" y2="65"/>
      <line x1="317.2" y1="55" x2="317.2" y2="65"/>
    </g>
    <text x="0" y="80" text-anchor="middle" class="tick-label">0</text>
    <text x="48.8" y="80" text-anchor="middle" class="tick-label">2 ft</text>
    <text x="97.6" y="80" text-anchor="middle" class="tick-label">4 ft</text>
    <text x="146.4" y="80" text-anchor="middle" class="tick-label">6 ft</text>
    <text x="195.2" y="80" text-anchor="middle" class="tick-label">8 ft</text>
    <text x="244" y="80" text-anchor="middle" class="tick-label">10 ft</text>
    <text x="292.8" y="80" text-anchor="middle" class="tick-label">12 ft</text>

    <!-- Same stick, same width (146 px) -->
    <rect x="20" y="35" width="146" height="14" fill="url(#wood)" stroke="#7a5a30" stroke-width="0.8"/>

    <!-- Measurement bracket -->
    <line x1="20" y1="25" x2="166" y2="25" stroke="#2e7d32" stroke-width="1.2"/>
    <line x1="20" y1="22" x2="20" y2="28" stroke="#2e7d32" stroke-width="1.2"/>
    <line x1="166" y1="22" x2="166" y2="28" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="93" y="17" text-anchor="middle" class="result" fill="#2e7d32">6 ft</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="200" x2="780" y2="200" stroke="#ddd" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ROW 2: VECTOR IN PLANE -->
  <text x="20" y="225" class="row-label">Vector in the plane</text>

  <!-- Same vector, basis (e1, e2) -->
  <g transform="translate(60,235)">
    <text x="155" y="15" text-anchor="middle" class="panel-title">Basis (e₁, e₂)</text>

    <g class="grid">
      <line x1="40" y1="40" x2="40" y2="220"/>
      <line x1="80" y1="40" x2="80" y2="220"/>
      <line x1="120" y1="40" x2="120" y2="220"/>
      <line x1="160" y1="40" x2="160" y2="220"/>
      <line x1="200" y1="40" x2="200" y2="220"/>
      <line x1="240" y1="40" x2="240" y2="220"/>
      <line x1="280" y1="40" x2="280" y2="220"/>
      <line x1="40" y1="40" x2="280" y2="40"/>
      <line x1="40" y1="80" x2="280" y2="80"/>
      <line x1="40" y1="120" x2="280" y2="120"/>
      <line x1="40" y1="160" x2="280" y2="160"/>
      <line x1="40" y1="200" x2="280" y2="200"/>
    </g>

    <line x1="40" y1="200" x2="280" y2="200" class="axis"/>
    <line x1="40" y1="40" x2="40" y2="220" class="axis"/>

    <!-- e1 = (1,0): length 40 px to the right -->
    <line x1="40" y1="200" x2="80" y2="200" class="basis-blue" marker-end="url(#arrB1)"/>
    <!-- e2 = (0,1): length 40 px up -->
    <line x1="40" y1="200" x2="40" y2="160" class="basis-blue" marker-end="url(#arrB1)"/>

    <!-- The arrow x ends at the same physical point as in the next panel.
         Choose x at grid coords (3, 2) → screen (40+120, 200-80) = (160, 120) -->
    <line x1="40" y1="200" x2="160" y2="120" class="vec" marker-end="url(#arrVec)"/>

    <!-- decomposition ghosts -->
    <line x1="40" y1="200" x2="160" y2="200" class="ghost"/>
    <line x1="160" y1="200" x2="160" y2="120" class="ghost"/>

    <text x="85" y="215" class="coord-label" fill="#1f4e79">e₁</text>
    <text x="20" y="160" class="coord-label" fill="#1f4e79">e₂</text>
    <text x="165" y="115" class="coord-label" fill="#c0392b">x</text>

    <circle cx="40" cy="200" r="3" fill="#333"/>

    <text x="155" y="235" text-anchor="middle" class="result" fill="#1f4e79">x = 3 e₁ + 2 e₂</text>
  </g>

  <!-- Same vector, different basis -->
  <g transform="translate(440,235)">
    <text x="155" y="15" text-anchor="middle" class="panel-title">Basis (b₁, b₂)</text>

    <g class="grid">
      <line x1="40" y1="40" x2="40" y2="220"/>
      <line x1="80" y1="40" x2="80" y2="220"/>
      <line x1="120" y1="40" x2="120" y2="220"/>
      <line x1="160" y1="40" x2="160" y2="220"/>
      <line x1="200" y1="40" x2="200" y2="220"/>
      <line x1="240" y1="40" x2="240" y2="220"/>
      <line x1="280" y1="40" x2="280" y2="220"/>
      <line x1="40" y1="40" x2="280" y2="40"/>
      <line x1="40" y1="80" x2="280" y2="80"/>
      <line x1="40" y1="120" x2="280" y2="120"/>
      <line x1="40" y1="160" x2="280" y2="160"/>
      <line x1="40" y1="200" x2="280" y2="200"/>
    </g>

    <line x1="40" y1="200" x2="280" y2="200" class="axis"/>
    <line x1="40" y1="40" x2="40" y2="220" class="axis"/>

    <!-- b1 = (2,0) in screen coords: 80 px to the right, ending at (120,200) -->
    <line x1="40" y1="200" x2="120" y2="200" class="basis-green" marker-end="url(#arrB2)"/>
    <!-- b2 = (1,2) on screen: 40 right, 80 up: ending at (80, 120) -->
    <line x1="40" y1="200" x2="80" y2="120" class="basis-green" marker-end="url(#arrB2)"/>

    <!-- SAME endpoint for x: (160, 120) — vector unchanged from left panel
         In basis b: we want α b1 + β b2 = x.
         b1 = (80,0) screen-shift; b2 = (40,-80) screen-shift; x = (120,-80).
         α(80) + β(40) = 120 and α(0) + β(-80) = -80, so β=1, α=1. -->
    <line x1="40" y1="200" x2="160" y2="120" class="vec" marker-end="url(#arrVec)"/>

    <!-- decomposition ghosts: tail+b1 then +b2 -->
    <line x1="40" y1="200" x2="120" y2="200" class="ghost"/>
    <line x1="120" y1="200" x2="160" y2="120" class="ghost"/>

    <text x="125" y="215" class="coord-label" fill="#2e7d32">b₁</text>
    <text x="55" y="115" class="coord-label" fill="#2e7d32">b₂</text>
    <text x="165" y="115" class="coord-label" fill="#c0392b">x</text>

    <circle cx="40" cy="200" r="3" fill="#333"/>

    <text x="155" y="235" text-anchor="middle" class="result" fill="#2e7d32">x = 1 b₁ + 1 b₂</text>
  </g>

  <!-- Bottom message -->
  <text x="410" y="475" text-anchor="middle" font-size="13" fill="#666" font-style="italic">
    The stick does not change when we switch from metres to feet. The arrow does not change when we switch from (e₁, e₂) to (b₁, b₂).
  </text>
</svg>
