<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b9770e"/>
    </marker>
  </defs>

  <style>
    .blob-V { fill: #e8f0f8; stroke: #1f4e79; stroke-width: 2; }
    .blob-W { fill: #fdf2e9; stroke: #b9770e; stroke-width: 2; }
    .arrow { stroke: #333; stroke-width: 1.8; fill: none; }
    .arrow-blue { stroke: #1f4e79; stroke-width: 1.5; fill: none; }
    .arrow-orange { stroke: #b9770e; stroke-width: 1.5; fill: none; }
    .label-big { font-size: 26px; font-style: italic; }
    .label { font-size: 15px; font-style: italic; }
    .map-label { font-size: 15px; fill: #333; font-style: italic; }
    .caption { font-size: 13px; fill: #555; }
    .panel-title { font-size: 14px; fill: #333; font-weight: bold; }
    .dot-V { fill: #1f4e79; }
    .dot-W { fill: #b9770e; }
  </style>

  <!-- Left panel: bijection -->
  <g>
    <text x="200" y="30" text-anchor="middle" class="panel-title">Bijection: nothing lost, nothing invented</text>

    <ellipse cx="100" cy="200" rx="70" ry="100" class="blob-V"/>
    <text x="100" y="130" text-anchor="middle" class="label-big" fill="#1f4e79">V</text>

    <ellipse cx="300" cy="200" rx="70" ry="100" class="blob-W"/>
    <text x="300" y="130" text-anchor="middle" class="label-big" fill="#b9770e">W</text>

    <!-- pairs -->
    <circle cx="90" cy="180" r="4" class="dot-V"/>
    <circle cx="290" cy="180" r="4" class="dot-W"/>
    <line x1="98" y1="182" x2="282" y2="180" class="arrow" marker-end="url(#arr)"/>

    <circle cx="110" cy="220" r="4" class="dot-V"/>
    <circle cx="310" cy="220" r="4" class="dot-W"/>
    <line x1="118" y1="220" x2="302" y2="220" class="arrow" marker-end="url(#arr)"/>

    <circle cx="80" cy="250" r="4" class="dot-V"/>
    <circle cx="280" cy="250" r="4" class="dot-W"/>
    <line x1="88" y1="250" x2="272" y2="250" class="arrow" marker-end="url(#arr)"/>

    <text x="200" y="155" text-anchor="middle" class="map-label">T</text>
  </g>

  <!-- Divider -->
  <line x1="420" y1="50" x2="420" y2="340" stroke="#ddd" stroke-width="1"/>

  <!-- Right panel: linearity diamond -->
  <g transform="translate(440,0)">
    <text x="180" y="30" text-anchor="middle" class="panel-title">Linearity: T(u + v) = T(u) + T(v)</text>

    <!-- Four corners of a square -->
    <!-- top-left: u, v in V -->
    <!-- top-right: T(u), T(v) in W -->
    <!-- bottom-left: u+v -->
    <!-- bottom-right: T(u)+T(v) = T(u+v) -->

    <!-- corners as labeled dots -->
    <circle cx="60" cy="100" r="4" fill="#1f4e79"/>
    <text x="20" y="105" class="label" fill="#1f4e79">u, v</text>

    <circle cx="300" cy="100" r="4" fill="#b9770e"/>
    <text x="312" y="105" class="label" fill="#b9770e">T(u), T(v)</text>

    <circle cx="60" cy="260" r="4" fill="#1f4e79"/>
    <text x="22" y="265" class="label" fill="#1f4e79">u + v</text>

    <circle cx="300" cy="260" r="4" fill="#b9770e"/>
    <text x="312" y="265" class="label" fill="#b9770e">T(u + v)</text>

    <!-- arrows -->
    <line x1="68" y1="100" x2="292" y2="100" class="arrow" marker-end="url(#arr)"/>
    <text x="180" y="92" text-anchor="middle" class="map-label">T</text>

    <line x1="60" y1="108" x2="60" y2="252" class="arrow-blue" marker-end="url(#arrBlue)"/>
    <text x="40" y="184" text-anchor="middle" class="label" fill="#1f4e79">add</text>

    <line x1="300" y1="108" x2="300" y2="252" class="arrow-orange" marker-end="url(#arrOrange)"/>
    <text x="335" y="184" text-anchor="middle" class="label" fill="#b9770e">add</text>

    <line x1="68" y1="260" x2="292" y2="260" class="arrow" marker-end="url(#arr)"/>
    <text x="180" y="280" text-anchor="middle" class="map-label">T</text>

    <!-- = sign in the middle -->
    <text x="180" y="200" text-anchor="middle" font-size="22" fill="#666">=</text>
    <text x="180" y="220" text-anchor="middle" class="caption">same result</text>

    <!-- Left side label V, right side W -->
    <text x="60" y="60" text-anchor="middle" font-size="20" font-style="italic" fill="#1f4e79">V</text>
    <text x="300" y="60" text-anchor="middle" font-size="20" font-style="italic" fill="#b9770e">W</text>
  </g>

  <text x="410" y="365" text-anchor="middle" font-size="13" fill="#666" font-style="italic">
    An isomorphism is bijective (left) and linear (right) — perfect translation of linear structure.
  </text>
</svg>
