<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 370" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrFlow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 14px; fill: #333; font-weight: bold; }
    .step-box { fill: #fafafa; stroke: #999; stroke-width: 1.2; rx: 8; }
    .step-conclusion { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; rx: 8; }
    .step-text { font-size: 18px; font-family: 'Cambria Math', 'Times New Roman', serif; font-style: italic; fill: #333; }
    .step-text-final { font-size: 20px; font-family: 'Cambria Math', 'Times New Roman', serif; font-style: italic; fill: #2e7d32; font-weight: bold; }
    .reason { font-size: 12px; fill: #666; font-style: italic; }
    .arrow { stroke: #555; stroke-width: 1.5; fill: none; }
  </style>

  <!-- TITLE -->
  <text x="410" y="30" text-anchor="middle" class="title">
    From v = eX = e′X′ &#160;to&#160; X = CX′
  </text>

  <!-- ===========================
       Four steps stacked vertically.
       Each box: width 460, height 50, centered horizontally at x=410.
       So box x = 180.
       y positions: 60, 140, 220, 300 (gap of 80 between top edges)
       =========================== -->

  <!-- Step 1: y = 60..110 -->
  <rect x="180" y="60" width="460" height="50" class="step-box"/>
  <text x="410" y="92" text-anchor="middle" class="step-text">v = eX = e′X′</text>
  <text x="170" y="92" text-anchor="end" class="reason">same vector, two bases:</text>

  <!-- Arrow 1->2: y from 110 to 140 -->
  <line x1="410" y1="110" x2="410" y2="138" class="arrow" marker-end="url(#arrFlow)"/>
  <text x="420" y="128" class="reason">substitute e′ = eC</text>

  <!-- Step 2: y = 140..190 -->
  <rect x="180" y="140" width="460" height="50" class="step-box"/>
  <text x="410" y="172" text-anchor="middle" class="step-text">v = eX = (eC)X′</text>

  <!-- Arrow 2->3: y from 190 to 220 -->
  <line x1="410" y1="190" x2="410" y2="218" class="arrow" marker-end="url(#arrFlow)"/>
  <text x="420" y="208" class="reason">associativity</text>

  <!-- Step 3: y = 220..270 -->
  <rect x="180" y="220" width="460" height="50" class="step-box"/>
  <text x="410" y="252" text-anchor="middle" class="step-text">eX = e(CX′)</text>

  <!-- Arrow 3->4: y from 270 to 300 -->
  <line x1="410" y1="270" x2="410" y2="298" class="arrow" marker-end="url(#arrFlow)"/>
  <text x="420" y="288" class="reason">uniqueness of coordinates in e</text>

  <!-- Step 4: y = 300..350 -->
  <rect x="180" y="300" width="460" height="50" class="step-conclusion"/>
  <text x="410" y="333" text-anchor="middle" class="step-text-final">X = CX′</text>
</svg>
