<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 410" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrE5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/>
    </marker>
    <marker id="arrTilde5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b9770e"/>
    </marker>
    <marker id="arrX5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="arrMid5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 14px; fill: #333; font-weight: bold; }
    .panel-title { font-size: 13px; fill: #333; font-weight: bold; }
    .grid { stroke: #eaeaea; stroke-width: 1; }
    .axis { stroke: #999; stroke-width: 1.2; }
    .basis-blue { stroke: #1f4e79; stroke-width: 2.5; fill: none; }
    .basis-orange { stroke: #b9770e; stroke-width: 2.5; fill: none; }
    .vec { stroke: #c0392b; stroke-width: 3; fill: none; }
    .ghost-e { stroke: #1f4e79; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; opacity: 0.6; }
    .ghost-t { stroke: #b9770e; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; opacity: 0.6; }
    .label { font-size: 13px; font-style: italic; }
    .result { font-size: 14px; font-style: italic; }
    .small-caption { font-size: 12px; fill: #555; font-style: italic; }
    .center-arrow { stroke: #333; stroke-width: 2; fill: none; }
    .mid-label { font-size: 14px; font-style: italic; fill: #333; }
  </style>

  <!-- TITLE -->
  <text x="410" y="30" text-anchor="middle" class="title">
    Same v = (3, 1) ∈ ℝ²: tuple = coordinates only in the standard basis
  </text>

  <!-- ===========================
       LEFT PANEL: standard basis
       Container: x=30 to x=330 (width 300)
       Grid: 40px per unit
       Origin in screen coords: (70, 180) — leaves room for negative y up to -1.5
       Visible grid: x = 30..330, y = 60..240
       So x-axis range: from x=-1 (screen 30) to x=6 (screen 310)
          y range: from y=+3 (screen 60) to y=-1.5 (screen 240)
       =========================== -->
  <g>
    <text x="180" y="58" text-anchor="middle" class="panel-title">Standard basis e</text>

    <!-- Grid: vertical lines at x = 30, 70, 110, ..., 310 (every 40px) -->
    <g class="grid">
      <line x1="30" y1="80" x2="30" y2="260"/>
      <line x1="70" y1="80" x2="70" y2="260"/>
      <line x1="110" y1="80" x2="110" y2="260"/>
      <line x1="150" y1="80" x2="150" y2="260"/>
      <line x1="190" y1="80" x2="190" y2="260"/>
      <line x1="230" y1="80" x2="230" y2="260"/>
      <line x1="270" y1="80" x2="270" y2="260"/>
      <line x1="310" y1="80" x2="310" y2="260"/>
      <!-- horizontal lines at y = 80, 120, 160, 200, 240 -->
      <line x1="30" y1="80" x2="330" y2="80"/>
      <line x1="30" y1="120" x2="330" y2="120"/>
      <line x1="30" y1="160" x2="330" y2="160"/>
      <line x1="30" y1="200" x2="330" y2="200"/>
      <line x1="30" y1="240" x2="330" y2="240"/>
    </g>

    <!-- axes: x-axis at screen y=200 (y=0 in math coords); y-axis at screen x=70 (x=0) -->
    <line x1="30" y1="200" x2="330" y2="200" class="axis"/>
    <line x1="70" y1="80" x2="70" y2="260" class="axis"/>

    <!-- e₁ = (1,0): screen (70,200) to (110,200) -->
    <line x1="70" y1="200" x2="110" y2="200" class="basis-blue" marker-end="url(#arrE5)"/>
    <!-- e₂ = (0,1): screen (70,200) to (70,160) -->
    <line x1="70" y1="200" x2="70" y2="160" class="basis-blue" marker-end="url(#arrE5)"/>

    <!-- v = (3,1): screen (70+120, 200-40) = (190,160) -->
    <line x1="70" y1="200" x2="190" y2="160" class="vec" marker-end="url(#arrX5)"/>

    <!-- decomposition: 3 e1 + 1 e2: (70,200) -> (190,200) -> (190,160) -->
    <line x1="70" y1="200" x2="190" y2="200" class="ghost-e"/>
    <line x1="190" y1="200" x2="190" y2="160" class="ghost-e"/>

    <!-- labels: position carefully -->
    <text x="118" y="215" class="label" fill="#1f4e79">e₁</text>
    <text x="55" y="160" class="label" fill="#1f4e79">e₂</text>
    <text x="198" y="160" class="label" fill="#c0392b">v</text>

    <circle cx="70" cy="200" r="3" fill="#333"/>
    <text x="60" y="218" class="small-caption">0</text>

    <text x="180" y="285" text-anchor="middle" class="result" fill="#1f4e79">
      [v]ₑ = (3, 1)ᵀ
    </text>
    <text x="180" y="305" text-anchor="middle" class="small-caption">tuple = coordinates here</text>
  </g>

  <!-- ===========================
       CENTRE: arrows + matrix (between the panels)
       Translated frame: origin at (355, 130).
       Arrows in local coords: from (0, 20) to (100, 20) labeled C
                               from (100, 55) to (0, 55) labeled C⁻¹
       Matrix C drawn below: brackets and entries
       =========================== -->
  <g transform="translate(355, 130)">
    <!-- Arrow right: C -->
    <line x1="0" y1="20" x2="100" y2="20" class="center-arrow" marker-end="url(#arrMid5)"/>
    <text x="50" y="10" text-anchor="middle" class="mid-label">C</text>

    <!-- Arrow left: C^-1 -->
    <line x1="100" y1="55" x2="0" y2="55" class="center-arrow" marker-end="url(#arrMid5)"/>
    <text x="50" y="80" text-anchor="middle" class="mid-label">C⁻¹</text>

    <!-- Matrix C below: "C =" label at (5, 130); brackets and entries -->
    <text x="0" y="130" class="mid-label">C =</text>
    <!-- Left bracket: y 105..140 -->
    <path d="M 42 105 L 35 105 L 35 140 L 42 140" stroke="#333" stroke-width="1.2" fill="none"/>
    <!-- Entries -->
    <text x="55" y="120" text-anchor="middle" class="small-caption">1</text>
    <text x="80" y="120" text-anchor="middle" class="small-caption">1</text>
    <text x="55" y="135" text-anchor="middle" class="small-caption">1</text>
    <text x="80" y="135" text-anchor="middle" class="small-caption">−1</text>
    <!-- Right bracket -->
    <path d="M 93 105 L 100 105 L 100 140 L 93 140" stroke="#333" stroke-width="1.2" fill="none"/>
  </g>

  <!-- ===========================
       RIGHT PANEL: new basis (shifted by 450)
       =========================== -->
  <g transform="translate(450, 0)">
    <text x="180" y="58" text-anchor="middle" class="panel-title">New basis e′</text>

    <g class="grid">
      <line x1="30" y1="80" x2="30" y2="260"/>
      <line x1="70" y1="80" x2="70" y2="260"/>
      <line x1="110" y1="80" x2="110" y2="260"/>
      <line x1="150" y1="80" x2="150" y2="260"/>
      <line x1="190" y1="80" x2="190" y2="260"/>
      <line x1="230" y1="80" x2="230" y2="260"/>
      <line x1="270" y1="80" x2="270" y2="260"/>
      <line x1="310" y1="80" x2="310" y2="260"/>
      <line x1="30" y1="80" x2="330" y2="80"/>
      <line x1="30" y1="120" x2="330" y2="120"/>
      <line x1="30" y1="160" x2="330" y2="160"/>
      <line x1="30" y1="200" x2="330" y2="200"/>
      <line x1="30" y1="240" x2="330" y2="240"/>
    </g>

    <line x1="30" y1="200" x2="330" y2="200" class="axis"/>
    <line x1="70" y1="80" x2="70" y2="260" class="axis"/>

    <!-- e'₁ = (1,1): (70,200) to (110,160) -->
    <line x1="70" y1="200" x2="110" y2="160" class="basis-orange" marker-end="url(#arrTilde5)"/>
    <!-- e'₂ = (1,-1): (70,200) to (110,240) -->
    <line x1="70" y1="200" x2="110" y2="240" class="basis-orange" marker-end="url(#arrTilde5)"/>

    <!-- v = (3,1): screen (70+120, 200-40) = (190,160) — SAME as left panel -->
    <line x1="70" y1="200" x2="190" y2="160" class="vec" marker-end="url(#arrX5)"/>

    <!-- decomposition: 2 e'₁ + 1 e'₂
         2·e'₁ = (2,2) → screen (70+80, 200-80) = (150, 120)
         + e'₂ = (1,-1) → screen (150+40, 120+40) = (190, 160) ✓ -->
    <line x1="70" y1="200" x2="150" y2="120" class="ghost-t"/>
    <line x1="150" y1="120" x2="190" y2="160" class="ghost-t"/>

    <text x="118" y="158" class="label" fill="#b9770e">e′₁</text>
    <text x="118" y="252" class="label" fill="#b9770e">e′₂</text>
    <text x="198" y="160" class="label" fill="#c0392b">v</text>

    <circle cx="70" cy="200" r="3" fill="#333"/>
    <text x="60" y="218" class="small-caption">0</text>

    <text x="180" y="285" text-anchor="middle" class="result" fill="#b9770e">
      [v]_e′ = (2, 1)ᵀ
    </text>
    <text x="180" y="305" text-anchor="middle" class="small-caption">tuple ≠ coordinates anymore</text>
  </g>

  <!-- Bottom caption -->
  <text x="410" y="370" text-anchor="middle" class="small-caption">
    The red arrow v is identical in both pictures. The coordinate column changes; the matrix C⁻¹ converts between them.
  </text>
  <text x="410" y="390" text-anchor="middle" class="small-caption">
    2·(1,1) + 1·(1,−1) = (3,1) = v &#160;✓
  </text>
</svg>
